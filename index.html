<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #1f1f1f;
            position: fixed;
            height: 100%;
            padding: 20px 0;
        }
        .sidebar h2 {
            color: #ffffff;
            text-align: center;
            padding: 10px;
        }
        .sidebar a {
            display: block;
            color: #b3b3b3;
            text-decoration: none;
            padding: 10px 15px;
            transition: background 0.3s;
        }
        .sidebar a:hover {
            background-color: #3a3a3a;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
        }
        .card {
            background: #282828;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .content {
                margin-left: 210px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Log Out</a>
    </div>
    <div class="content">
        <h1>Welcome to Your Control Panel</h1>
        <div class="card">
            <h3>Card Title</h3>
            <p>This is a card layout that you can use for various purposes.</p>
        </div>

            <h3>Card Title</h3>
            <p>This is a card layout that you can use for various purposes.</p>
        </div>

            <h3>Card Title</h3>

        </div>
    </div>
</body>
</html>
